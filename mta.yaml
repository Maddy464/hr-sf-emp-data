_schema-version: 3.3.0
ID: hr-sf-emp-data
description: A simple CAP project.
version: 1.0.0
modules:
- name: hr-sf-emp-data-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: hr-sf-emp-data-auth
  - name: hr-sf-emp-data-db
  - name: sap_processautomation-leave
  - name: hr-sf-emp-data-destination-service
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: hr-sf-emp-data-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: hr-sf-emp-data-db
  parameters:
    buildpack: nodejs_buildpack
- name: hr-sf-emp-data-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: hr-sf-emp-data-auth
  - name: srv-api
  - name: hr-sf-emp-data-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - comsapsfempui.zip
      name: comsapsfempui
      target-path: app/
    - artifacts:
      - comsapsfmgrui.zip
      name: comsapsfmgrui
      target-path: app/
- name: hr-sf-emp-data-destination-content
  type: com.sap.application.content
  requires:
  - name: hr-sf-emp-data-destination-service
    parameters:
      content-target: true
  - name: hr-sf-emp-data-html5-repo-host
    parameters:
      service-key:
        name: hr-sf-emp-data-html5-repo-host-key
  - name: hr-sf-emp-data-auth
    parameters:
      service-key:
        name: hr-sf-emp-data-auth-key
  - name: srv-api
  parameters:
    content:
      instance:
        destinations:
        - Name: emproute_hr_sf_emp_data_html5_repo_host
          ServiceInstanceName: hr-sf-emp-data-html5-repo-host
          ServiceKeyName: hr-sf-emp-data-html5-repo-host-key
          sap.cloud.service: emproute
        - Authentication: OAuth2UserTokenExchange
          Name: emproute_hr_sf_emp_data_auth
          ServiceInstanceName: hr-sf-emp-data-auth
          ServiceKeyName: hr-sf-emp-data-auth-key
          sap.cloud.service: emproute
        - Authentication: OAuth2ClientCredentials
          Name: hr-sf-emp-data-callback
          Description: CAP service callback destination for SAP Workflow approval tasks
          URL: ~{srv-api/srv-url}
          TokenServiceInstanceName: hr-sf-emp-data-auth
          TokenServiceKeyName: hr-sf-emp-data-auth-key
          HTML5.DynamicDestination: true
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: comsapsfempui
  type: html5
  path: app/emp_ui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: comsapsfmgrui
  type: html5
  path: app/mgr_ui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: leaveApproval
  type: com.sap.application.content
  path: leaveApproval
  requires:
  - name: sap_processautomation-leave
    parameters:
      content-target: true
      service-key:
        config:
          deployUsageScenario: workflow
        name: spa-workflow-service-key
resources:
- name: hr-sf-emp-data-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: hr-sf-emp-data-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: hr-sf-emp-data-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: hr-sf-emp-data-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
- name: hr-sf-emp-data-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: hr-sf-emp-data-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: sap_processautomation-leave
  type: org.cloudfoundry.managed-service
  parameters:
    service: process-automation-service
    service-plan: standard
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
